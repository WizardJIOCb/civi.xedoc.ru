services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: civi
      POSTGRES_USER: civi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - civi_postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civi -d civi"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4100
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://civi:${POSTGRES_PASSWORD:-change-me}@postgres:5432/civi
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODELS: ${OPENROUTER_MODELS:-openrouter/free}
      PUBLIC_ORIGIN: https://civi.xedoc.ru
      SIMULATION_SEED: ${SIMULATION_SEED:-xeodoc-chronicle-01}
      SIMULATION_AUTOSTART: "true"
      SIMULATION_TICK_MS: ${SIMULATION_TICK_MS:-3500}
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 4s
      retries: 4

volumes:
  civi_postgres:
